<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Înscrie-te — KidZone Cahul</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="../assets/Logo.png" type="image/png">
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-placeholder">
      <img src="../assets/Logo.png" alt="KidZone Logo">
    </div>
    <input type="checkbox" id="burger-toggle" class="burger-toggle">
    <label for="burger-toggle" class="burger-btn">
      <span></span><span></span><span></span>
    </label>
    <nav>
      <ul>
        <li><a href="../index.html">Acasă</a></li>
        <li><a href="Despre-Programe.html">Despre & Programe</a></li>
        <li><a href="Echipa.html">Echipa</a></li>
        <li><a href="Galerie-Parinti.html">Galerie & Părinții</a></li>
        <li><a href="Inscrie-te.html" class="nav-btn active">Înscrie-te</a></li>
      </ul>
    </nav>
  </div>
</header>

<main>
  <section class="inscrie-section">
    <div class="inscrie-header">
      <h2>Înscrie-te acum</h2>
      <p>Locurile sunt limitate — asigură-ți un loc pentru copilul tău!</p>
    </div>

    <div class="inscrie-form-wrap">
      <form id="inscriereForm" class="inscrie-form">
        <div class="inscrie-row">
          <input type="text" id="childName" placeholder="Numele copilului" required>
          <input type="date" id="birthDate" required>
        </div>
        <div class="inscrie-row">
          <input type="text" id="parentName" placeholder="Numele părintelui" required>
        </div>
        <div class="inscrie-row">
          <select id="program" class="inscrie-select" required>
            <option value="" disabled selected>Selectează programul</option>
            <option value="gradinita">Grădiniță (3–6 ani)</option>
            <option value="primar">Clasa Primară (7–12 ani)</option>
            <option value="robotica">Robotică</option>
            <option value="dans">Dans</option>
            <option value="fotbal">Fotbal</option>
          </select>
        </div>
        <div class="inscrie-row">
          <input type="tel" id="phone" placeholder="Numărul telefonului" required>
          <input type="email" id="email" placeholder="E-mail">
        </div>
        <button type="submit" id="submitBtn">Trimite Cererea</button>
      </form>
    </div>
  </section>
</main>

<footer>
  <div class="footer-inner">
    <div class="footer-logo">
      <img src="../assets/Logo.png" alt="KidZone Logo">
    </div>
    <p>KidZone Cahul © 2026 • Str. Ștefan cel Mare 45, Cahul •<br>
    +373 767 38 515 • lupasco.ruslan@gmail.com</p>
    <div class="footer-socials">
      <a href="https://www.instagram.com/danulupasco_/">Instagram</a>
      <a href="https://www.facebook.com/danil.lupasco">Facebook</a>
      <a href="https://www.tiktok.com/@walterus205?lang=ru-RU">TikTok</a>
      <a href="https://t.me/Walterus205">Telegram</a>
    </div>
  </div>
</footer>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyIt4jBnvZRDbtfpFMLn5uPRQVdXlLjP7q3_xPaOpjpFzsnOGledtbjdFEL0pLvComZNw/exec";

document.getElementById("inscriereForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const submitBtn = document.getElementById("submitBtn");
    const originalText = submitBtn.textContent;
    
    submitBtn.disabled = true;
    submitBtn.textContent = "Se trimite...";

    const data = {
        childName: document.getElementById("childName").value.trim(),
        birthDate: document.getElementById("birthDate").value,
        parentName: document.getElementById("parentName").value.trim(),
        program: document.getElementById("program").value,
        phone: document.getElementById("phone").value.trim(),
        email: document.getElementById("email").value.trim()
    };

    if (!data.childName || !data.birthDate || !data.parentName || !data.program || !data.phone) {
        alert("❌ Te rog completează toate câmpurile obligatorii!");
        submitBtn.disabled = false;
        submitBtn.textContent = originalText;
        return;
    }

    try {
        const response = await fetch(SCRIPT_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });

        alert("✅ Cererea a fost trimisă cu succes!");
        this.reset();

    } catch (error) {
        console.error("Fetch error:", error);
        alert("❌ Eroare de conexiune.\n\nVerifică:\n1. Ai ли интернет\n2. Скрипт опубликован с доступом 'Anyone'\n3. Попробуй обновить страницу");
    } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = originalText;
    }
});
</script>
</body>
</html>
