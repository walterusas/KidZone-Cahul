<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Înscrie-te — KidZone</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="../assets/Logo.png" type="image/png">
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-placeholder">
      <img src="../assets/Logo.png" alt="KidZone Logo">
    </div>
    <input type="checkbox" id="burger-toggle" class="burger-toggle">
<label for="burger-toggle" class="burger-btn">
  <span></span>
  <span></span>
  <span></span>
</label>
    <nav>
      <ul>
        <li><a href="../index.html">Acasă</a></li>
        <li><a href="Despre-Programe.html">Despre & Programe</a></li>
        <li><a href="Echipa.html">Echipa</a></li>
        <li><a href="Galerie-Parinti.html">Galerie & Părinții</a></li>
        <li><a href="Inscrie-te.html" class="nav-btn active">Înscrie-te</a></li>
      </ul>
    </nav>
  </div>
</header>

<main>

  <section class="inscrie-section">
    <div class="inscrie-header">
      <h2>Înscrie-te acum</h2>
      <p>Locurile sunt limitate — asigură-ți un loc pentru copilul tău!</p>
    </div>

    <div class="inscrie-form-wrap">
      <form class="inscrie-form">
  <div class="inscrie-row">
    <input type="text" placeholder="Numele copilului">
    <input type="date">
  </div>
  <div class="inscrie-row">
    <input type="text" placeholder="Numele părintelui" style="grid-column: 1 / -1;">
  </div>
  <div class="inscrie-row">
  <select class="inscrie-select">
    <option value="" disabled selected>Selectează programul</option>
    <option value="gradinita">Grădiniță (3–6 ani)</option>
    <option value="primar">Clasa Primară (7–12 ani)</option>
    <option value="robotica">Robotică (8–14 ani)</option>
    <option value="dans">Dans (toate vârstele)</option>
    <option value="fotbal">Fotbal (6–14 ani)</option>
  </select>
</div>
  <div class="inscrie-row">
    <input type="tel" placeholder="Numărul telefonului">
    <input type="email" placeholder="E-mail">
  </div>
  <button type="submit">Trimite Cererea</button>
</form>
    </div>
  </section>

</main>

<footer>
  <div class="footer-inner">
    <div class="footer-logo">
      <img src="../assets/Logo.png" alt="KidZone Logo">
    </div>
    <p>KidZone Cahul © 2026 • Str. Ștefan cel Mare 45, Cahul •<br>
    +373 767 38 515 • lupasco.ruslan@gmail.com</p>
    <div class="footer-socials">
      <a href="https://www.instagram.com/danulupasco_/">Instagram</a>
      <a href="https://www.facebook.com/danil.lupasco">Facebook</a>
      <a href="https://www.tiktok.com/@walterus205?lang=ru-RU">TikTok</a>
      <a href="https://t.me/Walterus205">Telegram</a>
    </div>
  </div>
</footer>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
  document.querySelector('.inscrie-form').addEventListener('submit', function(e) {
    e.preventDefault();

   
    const data = [
      ['Numele copilului', 'Data nasterii', 'Numele parintelui', 'Telefon', 'Email', 'Program'],
      [
        document.querySelectorAll('.inscrie-form input')[0].value,
        document.querySelectorAll('.inscrie-form input')[1].value,
        document.querySelectorAll('.inscrie-form input')[2].value,
        document.querySelectorAll('.inscrie-form input')[3].value,
        document.querySelectorAll('.inscrie-form input')[4].value,
        document.querySelector('.inscrie-select').value,
      ]
    ];

  
    const ws = XLSX.utils.aoa_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Inscrieri');

    
    XLSX.writeFile(wb, 'Inscriere_KidZone.xlsx');

    
    alert('Cererea a fost trimisă! Fișierul Excel a fost descărcat.');
    this.reset();
  });
</script>
</body>
</html>
